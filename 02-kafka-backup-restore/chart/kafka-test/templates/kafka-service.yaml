apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-kafka
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}-kafka
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: 9092
      targetPort: plaintext
      name: plaintext
    - port: 9093
      targetPort: controller
      name: controller
  selector:
    app: {{ .Release.Name }}-kafka
