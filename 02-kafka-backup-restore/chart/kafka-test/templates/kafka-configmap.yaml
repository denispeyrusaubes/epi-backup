apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kafka-config
  namespace: {{ .Values.namespace }}
data:
  server.properties.template: |
    # KRaft mode configuration
    process.roles=broker,controller
    node.id=NODE_ID_PLACEHOLDER
    controller.quorum.voters={{ include "kafka.quorumVoters" . }}
    controller.listener.names=CONTROLLER

    # Listeners
    listeners=PLAINTEXT://:9092,CONTROLLER://:9093
    inter.broker.listener.name=PLAINTEXT
    advertised.listeners=PLAINTEXT://ADVERTISED_LISTENERS_PLACEHOLDER
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

    # Log directories (sous-répertoire pour éviter le conflit avec lost+found)
    log.dirs=/var/lib/kafka/data/kraft-logs

    # Cluster ID
    cluster.id={{ .Values.kafka.clusterId }}

    # Topic defaults
    num.partitions=3
    default.replication.factor=3
    min.insync.replicas=2
    offsets.topic.replication.factor=3
    transaction.state.log.replication.factor=3
    transaction.state.log.min.isr=2

    # Log retention
    log.retention.hours=168
    log.segment.bytes=1073741824
