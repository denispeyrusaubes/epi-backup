apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: epi-kafka-cluster
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.0.0
    listeners:
      - name: controller
        port: 9092
        type: internal
        tls: false
      - name: sasl
        port: 9093
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
    authorization:
      type: simple
      superUsers:
        - "User:admin1"
    config:
      #process.roles: broker,controller
      #controller.listener.names: controller
      #listener.security.protocol.map: controller:PLAINTEXT,sasl:SASL_PLAINTEXT
      #inter.broker.listener.name: sasl
      #sasl.enabled.mechanisms: SCRAM-SHA-512
      default.replication.factor: 3
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      num.partitions: 3
  entityOperator:
    topicOperator: {}
    userOperator: {}
    template:
      pod:
        securityContext:
          runAsUser: 1001
          runAsGroup: 1001
          fsGroup: 1001
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
      topicOperatorContainer:
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
      userOperatorContainer:
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]