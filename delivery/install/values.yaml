# =============================================================================
# Velero Helm values — Kopia + MinIO (Tanzu/vSphere) — VGDP (Generic Data Path)
# Chart : vmware-tanzu/velero  v11.4.0  →  Velero 1.17.1
# =============================================================================
# Ce fichier contient des placeholders remplaces par install.sh :
#   __MINIO_BUCKET__       → valeur de MINIO_BUCKET dans config.env
#   __MINIO_REGION__       → valeur de MINIO_REGION dans config.env
#   __MINIO_URL__          → valeur de MINIO_URL dans config.env
#
# PREREQUIS COTE CLUSTER (a faire avant helm install) :
#   1. CSI driver vSphere actif avec support VolumeSnapshot
#      Tanzu guest : csi.vsphere.vmware.com
#   2. VolumeSnapshotClass labellisee (Velero 1.17+) :
#        label: velero.io/csi-volumesnapshot-class: "true"
#        deletionPolicy: Delete (Tanzu guest)
#   3. StorageClass utilisant le driver CSI vSphere
#   4. Namespace velero cree + secret velero-credentials (via install.sh)
# =============================================================================

image:
  repository: velero/velero
  tag: v1.17.1
  pullPolicy: IfNotPresent

# Plugin AWS (protocole S3 — compatible MinIO)
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.13.1
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

# -----------------------------------------------------------------------------
# Configuration principale
# -----------------------------------------------------------------------------
configuration:
  # Kopia comme moteur de transfert des donnees (VGDP data mover)
  uploaderType: kopia

  # Desactiver le file-system backup (ancienne approche PodVolumeBackup/Restore)
  # Les PVCs sont sauvegardes via CSI VolumeSnapshot + data mover (VGDP)
  defaultVolumesToFsBackup: false

  # Activer le plugin CSI de Velero (requis pour VGDP avec snapshotMoveData: true)
  features: EnableCSI

  # BackupStorageLocation — MinIO (protocole S3)
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: __MINIO_BUCKET__
      credential:
        name: velero-credentials
        key: cloud
      default: true
      config:
        region: __MINIO_REGION__
        s3ForcePathStyle: "true"
        s3Url: __MINIO_URL__
        # caCert est lu depuis ca.crt, encode en base64,
        # et injecte via --set-string lors du helm install.

  # VGDP utilise les CSI VolumeSnapshots (vSphere CSI driver).
  # Aucun VolumeSnapshotLocation AWS/vSphere necessaire ici —
  # la creation du snapshot est deleguee au CSI via la VolumeSnapshotClass.
  volumeSnapshotLocation: []

# Utiliser le secret cree par install.sh
credentials:
  useSecret: true
  existingSecret: velero-credentials

# -----------------------------------------------------------------------------
# Node-agent (DaemonSet) — OBLIGATOIRE pour VGDP (transfert Kopia → MinIO)
# -----------------------------------------------------------------------------
deployNodeAgent: true

nodeAgent:
  podVolumePath: /var/lib/kubelet/pods
  privileged: false
  resources: {}
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

# -----------------------------------------------------------------------------
# Velero deployment
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 500m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: false

# Desactiver le job bitnami/kubectl pour l'upgrade CRDs (tag inexistant sur Docker Hub)
upgradeCRDs: false
