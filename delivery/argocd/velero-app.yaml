apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: 11.4.0
    helm:
      valuesObject:
        image:
          repository: velero/velero
          tag: v1.17.1
          pullPolicy: IfNotPresent

        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.13.1
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins

        configuration:
          uploaderType: kopia
          defaultVolumesToFsBackup: false
          features: EnableCSI

          backupStorageLocation:
            - name: default
              provider: aws
              bucket: velero-pra                            # ← Adapter au bucket MinIO
              credential:
                name: velero-credentials
                key: cloud
              default: true
              config:
                region: minio
                s3ForcePathStyle: "true"
                s3Url: https://minio.example.com:9000       # ← Adapter a l'URL MinIO
                caCert: __CA_CERT_PEM__                     # ← contenu PEM de ca.crt

          volumeSnapshotLocation: []

        credentials:
          useSecret: true
          existingSecret: velero-credentials

        deployNodeAgent: true

        nodeAgent:
          podVolumePath: /var/lib/kubelet/pods
          privileged: false
          resources: {}
          extraVolumes:
            - name: udmrepo
              emptyDir: {}
          extraVolumeMounts:
            - name: udmrepo
              mountPath: /udmrepo
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule

        metrics:
          enabled: true
          serviceMonitor:
            enabled: false

        upgradeCRDs: false

  destination:
    server: https://kubernetes.default.svc
    namespace: velero

  # Permettre le patch de spec.objectStorage.caCert sans que selfHeal le reverte
  # Ce champ est injecte apres sync pour Kopia (node-agent)
  ignoreDifferences:
    - group: velero.io
      kind: BackupStorageLocation
      jsonPointers:
        - /spec/objectStorage/caCert

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
